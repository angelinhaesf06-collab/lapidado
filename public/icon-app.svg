<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Marrom Chocolate de Elite -->
  <rect width="512" height="512" rx="120" fill="#2D1B18"/>
  
  <defs>
    <!-- Gradiente Rose Gold -->
    <linearGradient id="roseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5A9A9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8D7D7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C28585;stop-opacity:1" />
    </linearGradient>
    <!-- Gradiente Ouro Real -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9E29C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- O Diamante Lapidado em Rose Gold -->
  <path d="M256 90L390 200L350 430L162 430L122 200L256 90Z" stroke="url(#roseGold)" stroke-width="14" stroke-linejoin="round"/>
  <path d="M122 200H390L256 430L122 200Z" stroke="url(#gold)" stroke-width="6" stroke-linejoin="round" opacity="0.4"/>
  
  <!-- Brilhos em Ouro -->
  <circle cx="170" cy="160" r="6" fill="url(#gold)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="340" cy="240" r="4" fill="white">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <!-- Nome Lapidado em Rose Gold -->
  <text x="256" y="480" text-anchor="middle" fill="url(#roseGold)" style="font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: 12px; text-transform: uppercase;">LAPIDADO</text>
</svg>
