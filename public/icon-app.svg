<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente de Metal Rose Gold Realista -->
    <linearGradient id="roseMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C18C7E;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#E5B8AC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5D5CB;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#D49E8F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A67265;stop-opacity:1" />
    </linearGradient>

    <!-- Filtro de Sombra e Profundidade 3D -->
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#4A2C24" flood-opacity="0.5"/>
    </filter>

    <!-- Filtro de Brilho Extremo -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo Metálico Arredondado (idêntico à foto) -->
  <rect width="512" height="512" rx="120" fill="url(#roseMetal)"/>
  <rect width="512" height="512" rx="120" fill="white" opacity="0.1"/>

  <!-- Círculo Cravejado de Diamantes -->
  <circle cx="256" cy="220" r="150" stroke="#4A2C24" stroke-width="2" opacity="0.2"/>
  <g filter="url(#glow)">
    <circle cx="256" cy="220" r="142" stroke="white" stroke-width="4" stroke-dasharray="2 6" stroke-linecap="round"/>
  </g>

  <!-- DIAMANTE CENTRAL CRAVEJADO (Substituindo o A) -->
  <g filter="url(#shadow3d)">
    <!-- Silhueta do Diamante em Bronze -->
    <path d="M256 80 L360 170 L256 360 L152 170 Z" fill="#4A2C24" opacity="0.15"/>
    <path d="M152 170 H360" stroke="#4A2C24" stroke-width="1" opacity="0.2"/>
    
    <!-- Pontos de Diamante Cravejado (Brancos Brilhantes) -->
    <g fill="white" filter="url(#glow)">
      <!-- Topo -->
      <circle cx="256" cy="90" r="5"/> <circle cx="220" cy="115" r="4"/> <circle cx="292" cy="115" r="4"/>
      <!-- Meio -->
      <circle cx="165" cy="170" r="6"/> <circle cx="200" cy="170" r="6"/> <circle cx="256" cy="170" r="8"/> <circle cx="312" cy="170" r="6"/> <circle cx="347" cy="170" r="6"/>
      <!-- Corpo Inferior -->
      <circle cx="210" cy="230" r="5"/> <circle cx="302" cy="230" r="5"/>
      <circle cx="230" cy="280" r="4"/> <circle cx="282" cy="280" r="4"/>
      <circle cx="256" cy="340" r="6"/>
    </g>
  </g>

  <!-- Brilhos Estrelares (idênticos à foto) -->
  <g fill="white">
    <path d="M380 100 L383 115 L395 118 L383 121 L380 136 L377 121 L365 118 L377 115 Z">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M130 140 L132 150 L140 152 L132 154 L130 164 L128 154 L120 152 L128 150 Z" opacity="0.8">
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Texto LAPIDADO (Fonte Serifada de Luxo, cor Bronze Profundo) -->
  <text x="256" y="460" text-anchor="middle" fill="#4A2C24" style="font-family: 'Times New Roman', serif; font-weight: 800; font-size: 72px; letter-spacing: 4px; text-transform: uppercase; filter: drop-shadow(0 2px 2px rgba(255,255,255,0.3));">LAPIDADO</text>
</svg>
