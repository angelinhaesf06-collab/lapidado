<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Filtros para Efeito 3D e Brilho -->
  <defs>
    <filter id="metalEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#white" result="specular">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularOut"/>
      <feComposite in="SourceGraphic" in2="specularOut" operator="over"/>
    </filter>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A395;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C3BA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B07D6E;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A2C24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#63443A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo Metálico Rose Gold -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Círculo Cravejado -->
  <circle cx="256" cy="220" r="140" stroke="#4A2C24" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="220" r="130" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Letra L Cravejada com Diamantes -->
  <g filter="url(#metalEffect)">
    <!-- Base do L -->
    <path d="M210 110V310H310" stroke="#4A2C24" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Diamantes no L (Simulados por círculos com brilho) -->
    <g fill="white">
      <circle cx="210" cy="120" r="6"/> <circle cx="210" cy="150" r="6"/>
      <circle cx="210" cy="180" r="6"/> <circle cx="210" cy="210" r="6"/>
      <circle cx="210" cy="240" r="6"/> <circle cx="210" cy="270" r="6"/>
      <circle cx="210" cy="300" r="6"/> <circle cx="240" cy="310" r="6"/>
      <circle cx="270" cy="310" r="6"/> <circle cx="300" cy="310" r="6"/>
    </g>
  </g>

  <!-- Brilhos Estrelares -->
  <path d="M380 120L385 135L400 140L385 145L380 160L375 145L360 140L375 135Z" fill="white">
     <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </path>
  <path d="M120 180L123 190L135 193L123 196L120 206L117 196L105 193L117 190Z" fill="white" opacity="0.6">
     <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Texto LAPIDADO em Bronze Profundo -->
  <text x="256" y="450" text-anchor="middle" fill="url(#textGradient)" style="font-family: 'Times New Roman', serif; font-weight: bold; font-size: 60px; letter-spacing: 5px; text-transform: uppercase;">LAPIDADO</text>
</svg>
