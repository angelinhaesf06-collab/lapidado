<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente Rose Gold Metálico do Ícone -->
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5B8AC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5D5CB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D49E8F;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filtro de Brilho para os Diamantes -->
    <filter id="diamondGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo Rose Gold Claro -->
  <rect width="1024" height="500" fill="#FDF5F2"/>
  <circle cx="900" cy="100" r="300" fill="url(#roseGrad)" opacity="0.2"/>
  <circle cx="100" cy="400" r="200" fill="url(#roseGrad)" opacity="0.1"/>

  <!-- RECRIAÇÃO DO LOGO "L" CRAVEJADO -->
  <g transform="translate(512, 180) scale(0.8)">
    <g transform="translate(-100, -120)">
      <!-- Sombra do L -->
      <path d="M40 0 H80 V180 H140 V220 H40 V0" fill="#4A322E" opacity="0.1" transform="translate(4,4)"/>
      <!-- Base do L -->
      <path d="M40 0 H80 V180 H140 V220 H40 V0" fill="#D49E8F"/>
      <!-- Diamantes (Círculos Brancos com Brilho) -->
      <g fill="white" filter="url(#diamondGlow)">
        <circle cx="60" cy="20" r="8"/> <circle cx="60" cy="50" r="8"/> <circle cx="60" cy="80" r="8"/>
        <circle cx="60" cy="110" r="8"/> <circle cx="60" cy="140" r="8"/> <circle cx="60" cy="170" r="8"/>
        <circle cx="60" cy="200" r="8"/> <circle cx="90" cy="200" r="8"/> <circle cx="120" cy="200" r="8"/>
        <!-- Brilhos menores -->
        <circle cx="60" cy="35" r="3" opacity="0.8"/> <circle cx="60" cy="65" r="3" opacity="0.8"/>
        <circle cx="75" cy="200" r="3" opacity="0.8"/> <circle cx="105" cy="200" r="3" opacity="0.8"/>
      </g>
    </g>
  </g>

  <!-- Texto conforme o novo design -->
  <text x="512" y="380" text-anchor="middle" fill="#4A322E" style="font-family: 'Montserrat', serif; font-weight: 800; font-size: 65px; letter-spacing: 8px; text-transform: uppercase;">LAPIDADO</text>
  <text x="512" y="430" text-anchor="middle" fill="#4A322E" opacity="0.6" style="font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 28px; letter-spacing: 4px; text-transform: uppercase;">CATÁLOGO</text>
</svg>
