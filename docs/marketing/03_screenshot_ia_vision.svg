<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1920" fill="#FDF5F2"/>
  <rect width="1080" height="600" fill="#F5D5CB" opacity="0.4"/>
  
  <text x="540" y="200" text-anchor="middle" fill="#4A322E" style="font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 60px; text-transform: uppercase;">MÁGICA IA</text>
  <text x="540" y="280" text-anchor="middle" fill="#4A322E" opacity="0.7" style="font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 45px;">CADASTRO AUTOMÁTICO</text>

  <g transform="translate(140, 450)">
    <rect width="800" height="1400" rx="60" fill="white" stroke="#D49E8F" stroke-width="15"/>
    <rect x="30" y="80" width="740" height="900" rx="40" fill="#F9F9F9"/>
    <!-- Simulação de Câmera/IA -->
    <rect x="200" y="300" width="400" height="400" rx="200" stroke="#D49E8F" stroke-width="2" stroke-dasharray="10 10"/>
    <circle cx="400" cy="500" r="10" fill="#D49E8F">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <rect x="150" y="1050" width="500" height="80" rx="40" fill="#4A322E"/>
    <text x="400" y="1105" text-anchor="middle" fill="white" style="font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 30px;">GEMINI 2.5 FLASH AI</text>
  </g>
</svg>
