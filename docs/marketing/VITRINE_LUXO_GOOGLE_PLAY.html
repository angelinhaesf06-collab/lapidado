<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vitrine de Luxo - Lapidado Google Play</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;800&display=swap');
        
        body {
            background: #fdf5f2;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a322e;
        }

        .container {
            width: 1080px;
            margin: 40px;
            background: #fff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #e5b8ac 0%, #f5d5cb 50%, #d49e8f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title {
            font-size: 60px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 35px;
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .mockup-frame {
            width: 800px;
            height: 1400px;
            background: #fff;
            border: 15px solid #d49e8f;
            border-radius: 60px;
            margin-top: -150px;
            box-shadow: 0 50px 100px rgba(74, 50, 46, 0.2);
            overflow: hidden;
            position: relative;
        }

        .app-screenshot {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f9f9f9;
        }

        .logo-small {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 80px;
            opacity: 0.5;
        }

        .footer-tag {
            padding: 40px;
            font-weight: 700;
            font-size: 25px;
            color: #c99090;
        }

        @media print {
            .container { margin: 0; page-break-after: always; box-shadow: none; }
        }
    </style>
</head>
<body>

    <!-- TELA 1 -->
    <div class="container">
        <div class="header">
            <div class="title">GESTÃO DE LUXO</div>
            <div class="subtitle">Controle total do seu estoque de joias</div>
        </div>
        <div class="mockup-frame">
            <img src="screens/WhatsApp Image 2026-04-28 at 09.46.49.jpeg" class="app-screenshot">
        </div>
        <div class="footer-tag">LAPIDADO CATÁLOGO ✨</div>
    </div>

    <!-- TELA 2 -->
    <div class="container">
        <div class="header">
            <div class="title">MÁGICA IA</div>
            <div class="subtitle">Cadastro automático via foto com Gemini</div>
        </div>
        <div class="mockup-frame">
            <img src="screens/WhatsApp Image 2026-04-28 at 09.46.49 (1).jpeg" class="app-screenshot">
        </div>
        <div class="footer-tag">TECNOLOGIA QUE ENCANTA ✨</div>
    </div>

    <!-- TELA 3 -->
    <div class="container">
        <div class="header">
            <div class="title">SUA VITRINE</div>
            <div class="subtitle">Catálogo personalizado para sua marca</div>
        </div>
        <div class="mockup-frame">
            <img src="screens/WhatsApp Image 2026-04-28 at 09.46.49 (2).jpeg" class="app-screenshot">
        </div>
        <div class="footer-tag">WHITE-LABEL DE ALTO PADRÃO ✨</div>
    </div>

    <!-- TELA 4 -->
    <div class="container">
        <div class="header">
            <div class="title">LUCRO REAL</div>
            <div class="subtitle">Saiba exatamente quanto você ganha</div>
        </div>
        <div class="mockup-frame">
            <img src="screens/WhatsApp Image 2026-04-28 at 09.46.49 (3).jpeg" class="app-screenshot">
        </div>
        <div class="footer-tag">INTELIGÊNCIA FINANCEIRA ✨</div>
    </div>

</body>
</html>
